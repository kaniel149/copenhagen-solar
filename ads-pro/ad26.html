<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;position:relative;background:linear-gradient(160deg,#1A7A5A 0%,#0D2137 60%);}
.logo{position:absolute;top:40px;left:40px;display:flex;align-items:center;gap:12px;z-index:2;}
.logo-circle{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,.3);border:2px solid #E8A820;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#E8A820;}
.logo-text{font-weight:700;font-size:16px;color:#E8A820;letter-spacing:2px;}
.free-badge{position:absolute;top:36px;right:40px;background:#E8A820;color:#0D2137;font-weight:900;font-size:18px;padding:12px 28px;border-radius:12px;z-index:2;transform:rotate(3deg);}
.content{position:absolute;top:50%;left:60px;right:60px;transform:translateY(-50%);text-align:center;z-index:2;}
.icon{font-size:100px;margin-bottom:24px;}
.headline{font-family:'Playfair Display',serif;font-size:72px;font-weight:900;color:#fff;line-height:1.1;margin-bottom:16px;}
.headline span{color:#E8A820;}
.sub{font-size:24px;color:rgba(255,255,255,.7);line-height:1.5;margin-bottom:40px;max-width:800px;margin-left:auto;margin-right:auto;}
.steps{display:flex;gap:20px;margin-bottom:48px;justify-content:center;}
.step{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px 20px;width:200px;text-align:center;}
.step-num{width:36px;height:36px;border-radius:50%;background:#E8A820;color:#0D2137;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.step-text{font-size:15px;color:rgba(255,255,255,.8);font-weight:600;line-height:1.4;}
.cta-group{display:flex;gap:16px;justify-content:center;align-items:center;}
.cta-btn{background:#E8A820;color:#0D2137;font-weight:800;font-size:22px;padding:20px 44px;border-radius:14px;box-shadow:0 4px 24px rgba(232,168,32,.3);}
.cta-whatsapp{background:rgba(37,211,102,.15);border:2px solid #25D366;color:#25D366;font-weight:700;font-size:18px;padding:18px 32px;border-radius:14px;display:flex;align-items:center;gap:8px;}
.phone{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-size:18px;color:rgba(255,255,255,.4);z-index:2;}
.phone b{color:#fff;}
</style></head>
<body>
<div class="logo"><div class="logo-circle">TM</div><div class="logo-text">TM ENERGY</div></div>
<div class="free-badge">100% FREE</div>
<div class="content">
<div class="icon">🛰️</div>
<div class="headline">Free <span>Site Survey</span></div>
<div class="sub">We visit your property, assess your roof, analyze your electricity bills, and design a custom solar system — completely free.</div>
<div class="steps">
<div class="step"><div class="step-num">1</div><div class="step-text">WhatsApp<br>us</div></div>
<div class="step"><div class="step-num">2</div><div class="step-text">We visit<br>your site</div></div>
<div class="step"><div class="step-num">3</div><div class="step-text">Get your<br>proposal</div></div>
<div class="step"><div class="step-num">4</div><div class="step-text">Start<br>saving</div></div>
</div>
<div class="cta-group">
<div class="cta-btn">BOOK NOW →</div>
<div class="cta-whatsapp">💬 WhatsApp Us</div>
</div>
</div>
<div class="phone">Call: <b>062-348-0119</b> · Koh Phangan</div>
</body></html>
