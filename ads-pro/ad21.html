<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;position:relative;
background:linear-gradient(160deg,#0A1929 0%,#0D2137 40%,#132F4F 100%);}
.logo{position:absolute;top:40px;left:40px;display:flex;align-items:center;gap:12px;}
.logo-circle{width:44px;height:44px;border-radius:50%;background:#1A1A1A;border:2px solid #E8A820;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#E8A820;letter-spacing:1px;}
.logo-text{font-weight:700;font-size:16px;color:#E8A820;letter-spacing:2px;}
.big-zero{position:absolute;top:120px;left:40px;font-family:'Playfair Display',serif;font-size:320px;font-weight:900;color:#E8A820;line-height:.85;opacity:.15;}
.main-content{position:absolute;top:280px;left:60px;right:60px;}
.headline{font-size:72px;font-weight:900;line-height:1.05;color:#fff;letter-spacing:-2px;}
.headline .gold{color:#E8A820;}
.sub{font-size:24px;color:rgba(255,255,255,.6);margin-top:20px;line-height:1.5;max-width:700px;}
.stats{position:absolute;bottom:200px;left:60px;right:60px;display:flex;gap:40px;}
.stat{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;text-align:center;}
.stat-num{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;color:#E8A820;}
.stat-label{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px;text-transform:uppercase;letter-spacing:1px;}
.cta{position:absolute;bottom:60px;left:60px;right:60px;display:flex;align-items:center;justify-content:space-between;}
.cta-btn{background:#E8A820;color:#0D2137;font-weight:800;font-size:20px;padding:18px 40px;border-radius:12px;letter-spacing:1px;}
.cta-phone{font-size:18px;color:rgba(255,255,255,.5);}
.cta-phone b{color:#fff;}
</style></head>
<body>
<div class="logo"><div class="logo-circle">TM</div><div class="logo-text">TM ENERGY</div></div>
<div class="big-zero">฿0</div>
<div class="main-content">
<div class="headline">Zero Cost.<br><span class="gold">Solar Power.</span></div>
<div class="sub">We install solar on your roof for free.<br>You pay only for the power you use — at 25% less than PEA.</div>
</div>
<div class="stats">
<div class="stat"><div class="stat-num">฿0</div><div class="stat-label">Upfront Cost</div></div>
<div class="stat"><div class="stat-num">25%</div><div class="stat-label">Lower Rate</div></div>
<div class="stat"><div class="stat-num">25yr</div><div class="stat-label">Warranty</div></div>
</div>
<div class="cta">
<div class="cta-btn">GET FREE QUOTE →</div>
<div class="cta-phone">WhatsApp: <b>062-348-0119</b></div>
</div>
</body></html>
