<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;position:relative;background:#0D2137;}
.top-bar{position:absolute;top:0;left:0;right:0;height:60px;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:space-between;padding:0 40px;z-index:10;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-circle{width:32px;height:32px;border-radius:50%;background:#1A1A1A;border:2px solid #E8A820;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:10px;color:#E8A820;}
.logo-text{font-weight:700;font-size:13px;color:#E8A820;letter-spacing:2px;}
.tag{background:rgba(232,168,32,.15);color:#E8A820;padding:4px 12px;border-radius:100px;font-size:11px;font-weight:700;}
.split{display:flex;height:100%;}
.panel-left{flex:1;position:relative;overflow:hidden;}
.panel-right{flex:1;position:relative;overflow:hidden;}
.panel-left .bg{position:absolute;inset:0;background:linear-gradient(180deg,#2a1a1a 0%,#1a0808 50%,#0d0404 100%);}
.panel-right .bg{position:absolute;inset:0;background:linear-gradient(180deg,#0d2a1a 0%,#0a1f14 50%,#061410 100%);}
.panel-content{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100%;padding:80px 40px;}
.panel-label{font-size:14px;text-transform:uppercase;letter-spacing:6px;font-weight:800;margin-bottom:24px;}
.left .panel-label{color:#E53935;}
.right .panel-label{color:#43A047;}
.panel-icon{font-size:80px;margin-bottom:20px;}
.panel-headline{font-family:'Playfair Display',serif;font-size:48px;font-weight:900;text-align:center;line-height:1.2;margin-bottom:20px;}
.left .panel-headline{color:#ffcccc;}
.right .panel-headline{color:#ccffdd;}
.bill-amount{font-size:64px;font-weight:900;margin:10px 0;}
.left .bill-amount{color:#E53935;}
.right .bill-amount{color:#43A047;}
.detail{font-size:16px;color:rgba(255,255,255,.4);text-align:center;line-height:1.5;}
.center-arrow{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;width:60px;height:60px;background:#E8A820;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 4px 20px rgba(232,168,32,.4);}
.bottom-bar{position:absolute;bottom:0;left:0;right:0;height:100px;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:space-between;padding:0 60px;z-index:10;}
.bottom-text{font-size:20px;font-weight:700;color:#fff;}
.bottom-text span{color:#E8A820;}
.cta-btn{background:#E8A820;color:#0D2137;font-weight:800;font-size:16px;padding:14px 28px;border-radius:10px;}
</style></head>
<body>
<div class="top-bar"><div class="logo-row"><div class="logo-circle">TM</div><div class="logo-text">TM ENERGY</div></div><div class="tag">KOH PHANGAN</div></div>
<div class="split">
<div class="panel-left left"><div class="bg"></div><div class="panel-content">
<div class="panel-label">Before</div>
<div class="panel-icon">😰</div>
<div class="panel-headline">Your PEA Bill</div>
<div class="bill-amount">฿42,000</div>
<div class="detail">per month · rising every year<br>+ blackouts during storms</div>
</div></div>
<div class="panel-right right"><div class="bg"></div><div class="panel-content">
<div class="panel-label">After TM Energy</div>
<div class="panel-icon">😎</div>
<div class="panel-headline">Your New Bill</div>
<div class="bill-amount">฿12,600</div>
<div class="detail">per month · fixed rate<br>70% savings · clean energy</div>
</div></div>
</div>
<div class="center-arrow">→</div>
<div class="bottom-bar">
<div class="bottom-text">Save <span>฿352,800/year</span> with solar</div>
<div class="cta-btn">GET FREE QUOTE →</div>
</div>
</body></html>
