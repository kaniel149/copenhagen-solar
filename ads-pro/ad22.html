<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif;position:relative;background:#0A0A0A;}
.split{display:flex;height:100%;}
.left{flex:1;background:linear-gradient(180deg,#1a0000 0%,#330000 50%,#1a0000 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;}
.right{flex:1;background:linear-gradient(180deg,#001a0d 0%,#003320 50%,#001a0d 100%);display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;}
.side-label{font-size:14px;text-transform:uppercase;letter-spacing:4px;margin-bottom:16px;font-weight:700;}
.left .side-label{color:#E53935;}
.right .side-label{color:#43A047;}
.icon{font-size:120px;margin-bottom:24px;}
.side-text{font-size:28px;font-weight:700;text-align:center;line-height:1.4;padding:0 40px;}
.left .side-text{color:#ffcccc;}
.right .side-text{color:#ccffdd;}
.divider{position:absolute;left:50%;top:0;bottom:0;width:4px;background:linear-gradient(180deg,transparent,#E8A820,transparent);z-index:10;transform:translateX(-50%);}
.vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;width:60px;height:60px;background:#E8A820;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#0A0A0A;}
.logo{position:absolute;top:32px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:10px;}
.logo-circle{width:36px;height:36px;border-radius:50%;background:#1A1A1A;border:2px solid #E8A820;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#E8A820;}
.logo-text{font-weight:700;font-size:13px;color:#E8A820;letter-spacing:2px;}
.bottom{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.9);padding:32px 60px;display:flex;align-items:center;justify-content:space-between;z-index:20;}
.bottom-text{font-size:22px;font-weight:700;color:#fff;}
.bottom-text span{color:#E8A820;}
.cta-btn{background:#E8A820;color:#0D2137;font-weight:800;font-size:16px;padding:14px 32px;border-radius:10px;}
</style></head>
<body>
<div class="logo"><div class="logo-circle">TM</div><div class="logo-text">TM ENERGY</div></div>
<div class="split">
<div class="left">
<div class="side-label">Without Solar</div>
<div class="icon">🔌</div>
<div class="side-text">Blackouts.<br>Rising bills.<br>฿40,000/month<br>to PEA.</div>
</div>
<div class="right">
<div class="side-label">With TM Energy</div>
<div class="icon">☀️</div>
<div class="side-text">24/7 Power.<br>Fixed rate.<br>Save ฿300K+<br>per year.</div>
</div>
</div>
<div class="divider"></div>
<div class="vs">VS</div>
<div class="bottom">
<div class="bottom-text">Stop overpaying for <span>unreliable power</span></div>
<div class="cta-btn">FREE QUOTE →</div>
</div>
</body></html>
